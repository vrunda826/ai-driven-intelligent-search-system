video:
  input_path: "D:/projects/AIVisionInput/videos/Export__Rly Station-Towards Bismillah Rest left_Friday July 10 202661242  09a94cc.avi"
  camera_info_path: "D:/projects/AIVisionInput/camera_info.json"
  frame_skip: 2              # process every Nth frame (speed vs accuracy tradeoff)
  resize_width: 960
  resize_height: 540
  denoise: true

detection:
  model_path: "models/yolo11n.pt"    # any ultralytics-compatible weights file
  confidence_threshold: 0.4
  iou_threshold: 0.5
  # COCO class ids: 0=person, 2=car, 3=motorcycle, 5=bus, 7=truck
  classes: [0, 2, 3, 5, 7]

tracking:
  track_activation_threshold: 0.25
  lost_track_buffer: 30
  minimum_matching_threshold: 0.8
  frame_rate: 30
  min_observations: 10
  min_track_duration_sec: 0.5

attributes:
  color_k_clusters: 3
  min_crop_size: 20          # skip attribute extraction on crops smaller than this (px)
  skin_cr_min: 133
  skin_cr_max: 173
  skin_cb_min: 77
  skin_cb_max: 127
  color_palette: "extended"
  plate_ocr:
    enabled: true
    min_confidence: 0.4

output:
  crops_dir: "output/crops"
  annotated_video_dir: "output/annotated_video"
  metadata_dir: "output/metadata"
  save_crops: true
  save_annotated_video: true
  crop_save_interval: 15      # save at most 1 crop every N frames per track (avoid duplicate spam)

integration:
  # Endpoints for Member 2 (ai-search) and Member 3 (backend). Leave blank to skip sending.
  ai_search_endpoint: ""
  backend_endpoint: ""
  send_on_finalize: true

logging:
  level: "INFO"
  log_file: "output/pipeline.log"

spatial:
  # Polygons defined in 1920x1080 coordinates (original frame dimensions)
  zones:
    - name: "Entrance Gate"
      polygon: [[0, 200], [500, 200], [500, 1080], [0, 1080]]
    - name: "Parking Area"
      polygon: [[1300, 300], [1920, 300], [1920, 1080], [1300, 1080]]
    - name: "Main Road"
      polygon: [[500, 400], [1300, 400], [1300, 1080], [500, 1080]]

motion:
  fps: 30
  speed_threshold_slow: 2.0      # px per frame
  speed_threshold_fast: 8.0      # px per frame
  stationary_duration_threshold: 5.0 # seconds to determine stationary
  direction_smoothing_window: 7   # frames window for direction smoothing

models:
  clip_model_name: "openai/clip-vit-base-patch32"
  use_deep_attributes: true
  use_reid: true

quality:
  min_brightness: 40.0
  max_brightness: 220.0
  min_sharpness: 80.0
  sharpness_min_for_finegrained: 120.0

confidence:
  attribute_threshold: 0.60
  detection_threshold: 0.40
  color_ciede_sigma: 25.0

fusion:
  method: "weighted_majority"

events:
  running_speed_threshold: 8.0          # px per frame
  crowd_threshold_size: 4               # min people for crowd
  long_stop_threshold_sec: 20.0          # seconds
  suspicious_loitering_threshold_sec: 15.0 # seconds
  prolonged_parking_threshold_sec: 30.0    # seconds


